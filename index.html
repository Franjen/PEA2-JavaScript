<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>PEA 2 - Sistema de Cotización de Computadoras</title>

    <link rel="stylesheet" href="css/styles.css">

    <!-- Librería jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <!-- Librerías para generar PDF -->

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>

</head>

<body>

    <!-- Encabezado -->
    <header>

        <h1>💻 Sistema de Cotización de Computadoras</h1>

        <p>Aplicación desarrollada con HTML5, CSS, JavaScript y jQuery</p>

        <p id="fecha"></p>

    </header>

    <div id="bienvenida"></div>

    <!-- Contenido principal -->

    <main>

        <section class="card">

            <h2>Ingrese los datos</h2>

            <form id="formulario">

                <div class="grupo">

                    <label>Nombre del Cliente</label>

                    <input type="text" id="nombre" placeholder="Ingrese su nombre">

                </div>

                <div class="grupo">

                    <label>Procesador</label>

                    <select id="procesador">

                        <option value="">Seleccione</option>

                        <option value="i3">Intel Core i3</option>

                        <option value="i5">Intel Core i5</option>

                        <option value="i7">Intel Core i7</option>

                    </select>

                </div>

                <div class="grupo">

                    <label>Memoria RAM</label>

                    <select id="ram">

                        <option value="">Seleccione</option>

                        <option value="8">8 GB</option>

                        <option value="16">16 GB</option>

                        <option value="32">32 GB</option>

                    </select>

                </div>

                <div class="grupo">

                    <label>Disco SSD</label>

                    <select id="ssd">

                        <option value="">Seleccione</option>

                        <option value="256">256 GB</option>

                        <option value="512">512 GB</option>

                        <option value="1024">1 TB</option>

                    </select>

                </div>

                <div class="grupo">

                    <label>Cantidad</label>

                    <input type="number" id="cantidad" min="1" value="1">

                </div>

                <button type="button" id="calcular">

                    Calcular Cotización

                </button>

                <button type="button" id="limpiar">

                    Limpiar

                </button>

                <button type="button" id="pdf">

                    Generar Cotización PDF

                </button>

            </form>

        </section>

        <section class="card resultado">

            <h2>Resultado</h2>

            <div id="resultado">

                Aquí aparecerá la cotización.

            </div>

        </section>

    </main>

    <footer>

        <p>

            © 2026 - PEA 2 Desarrollo Web

        </p>

    </footer>

    <script src="js/script.js"></script>

</body>

</html>
